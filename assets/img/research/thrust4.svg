<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 310">
  <rect width="520" height="310" rx="12" fill="#F0F4F8"/>

  <!-- ── Title ── -->
  <text x="260" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#0C2340">Model-Predictive Control Architecture</text>

  <!-- ══════════════════════════════════════════
       Control loop blocks  (y center ≈ 130)
  ══════════════════════════════════════════ -->
  <defs>
    <marker id="ca" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0C2340"/>
    </marker>
    <marker id="caG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C99700"/>
    </marker>
    <marker id="caB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#185FA5"/>
    </marker>
  </defs>

  <!-- Reference input -->
  <rect x="18" y="104" width="70" height="50" rx="6" fill="#E8EFF8" stroke="#0C2340" stroke-width="2"/>
  <text x="53" y="126" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#0C2340">Reference</text>
  <text x="53" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#64748B">i*, ω*, T*</text>

  <!-- Arrow: Reference → MPC -->
  <line x1="88" y1="129" x2="118" y2="129" stroke="#0C2340" stroke-width="2" marker-end="url(#ca)"/>

  <!-- MPC / Observer block (highlighted) -->
  <rect x="118" y="90" width="110" height="78" rx="8" fill="#0C2340" stroke="#C99700" stroke-width="2.5"/>
  <text x="173" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#C99700">MPC</text>
  <text x="173" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">Observer</text>
  <text x="173" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">Physics Model</text>

  <!-- Arrow: MPC → PWM -->
  <line x1="228" y1="129" x2="258" y2="129" stroke="#0C2340" stroke-width="2" marker-end="url(#ca)"/>

  <!-- PWM / Gate Drive block -->
  <rect x="258" y="104" width="85" height="50" rx="6" fill="#FEF9EC" stroke="#C99700" stroke-width="2"/>
  <text x="300" y="126" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#0C2340">PWM /</text>
  <text x="300" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#64748B">Gate Drive</text>

  <!-- Arrow: PWM → Machine -->
  <line x1="343" y1="129" x2="373" y2="129" stroke="#0C2340" stroke-width="2" marker-end="url(#ca)"/>

  <!-- Machine block -->
  <rect x="373" y="95" width="100" height="68" rx="8" fill="#DBEAFE" stroke="#185FA5" stroke-width="2.5"/>
  <text x="423" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="22">⚙</text>
  <text x="423" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#185FA5">Machine</text>

  <!-- Output arrow -->
  <line x1="473" y1="129" x2="505" y2="129" stroke="#0C2340" stroke-width="2" marker-end="url(#ca)"/>
  <text x="510" y="122" font-family="Arial,sans-serif" font-size="10" fill="#64748B">ω</text>
  <text x="510" y="134" font-family="Arial,sans-serif" font-size="10" fill="#64748B">T</text>
  <text x="510" y="146" font-family="Arial,sans-serif" font-size="10" fill="#64748B">i</text>

  <!-- ══════════════════════════════════════════
       Feedback path (below main loop)
  ══════════════════════════════════════════ -->
  <!-- Feedback line from output down and left back to MPC -->
  <polyline points="490,163 490,195 173,195 173,168"
            fill="none" stroke="#C99700" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#caG)"/>
  <text x="335" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#C99700" font-weight="600">Feedback  (sensors + state estimation)</text>

  <!-- ══════════════════════════════════════════
       Physics model sidecar (below MPC block)
  ══════════════════════════════════════════ -->
  <rect x="90" y="220" width="165" height="58" rx="8" fill="#E8EFF8" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="172" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#185FA5">Physics-Based Model</text>
  <text x="172" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#334155">EM · Thermal · Mechanical</text>
  <text x="172" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#334155">Real-time prediction horizon</text>
  <!-- Connector to MPC -->
  <line x1="172" y1="220" x2="172" y2="168" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#caB)"/>

  <!-- ══════════════════════════════════════════
       Key benefit callout (right)
  ══════════════════════════════════════════ -->
  <rect x="300" y="225" width="198" height="58" rx="8" fill="#0C2340"/>
  <text x="399" y="247" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#C99700">High-Bandwidth Performance</text>
  <text x="399" y="263" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.85)">No rare sensors · Fault-tolerant</text>
  <text x="399" y="277" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">Wide operating range</text>
</svg>
